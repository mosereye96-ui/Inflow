<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:16px;}
.app{max-width:480px;margin:0 auto;padding-top:12px;}
.brand{font-size:20px;font-weight:500;margin-bottom:2px;}
.sub{font-size:13px;color:#888780;margin-bottom:16px;}
.nav{display:flex;gap:4px;margin-bottom:16px;background:#e8e8e4;border-radius:10px;padding:4px;}
.nt{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:#5f5e5a;border-radius:8px;cursor:pointer;border:none;background:none;}
.nt.active{background:#fff;color:#1a1a18;border:0.5px solid rgba(0,0,0,0.1);}
.view{display:none;}.view.active{display:block;}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.st{background:#e8e8e4;border-radius:8px;padding:10px;}
.sl{font-size:11px;color:#888780;margin-bottom:3px;}
.sv{font-size:18px;font-weight:500;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:16px;margin-bottom:12px;}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ct{font-size:14px;font-weight:500;}
.badge{font-size:12px;padding:3px 10px;border-radius:8px;font-weight:500;}
.bg{background:#EAF3DE;color:#3B6D11;}.ba{background:#FAEEDA;color:#854F0B;}.br{background:#FCEBEB;color:#A32D2D;}.bb{background:#E6F1FB;color:#185FA5;}
.tr{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);cursor:pointer;user-select:none;}
.tr:last-child{border-bottom:none;}
.ck{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ck.done{background:#639922;border-color:#639922;}
.ck.done::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);}
.tn{flex:1;font-size:14px;}
.tn.done{color:#888780;text-decoration:line-through;}
.tt{font-size:12px;color:#b4b2a9;}
.hml{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.hmll{font-size:10px;color:#b4b2a9;text-align:center;}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.hmd{aspect-ratio:1;border-radius:3px;}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:#888780;align-items:center;margin-top:4px;}
.legend span{display:flex;align-items:center;gap:4px;}
.ldot{width:10px;height:10px;border-radius:2px;}
.yg{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-top:8px;}
.ym{text-align:center;}
.yml{font-size:10px;color:#888780;margin-bottom:3px;}
.ymg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.yc{aspect-ratio:1;border-radius:1px;}
</style>
</head>
<body>
<div class="app">
  <div class="brand">Scoreboard</div>
  <div class="sub">Your daily progress tracker</div>
  <div class="nav">
    <button class="nt active" onclick="showView('daily',this)">Daily</button>
    <button class="nt" onclick="showView('weekly',this)">Weekly</button>
    <button class="nt" onclick="showView('monthly',this)">Monthly</button>
  </div>

  <div id="v-daily" class="view active">
    <div class="sr">
      <div class="st"><div class="sl">Score</div><div class="sv" id="d-score">0%</div></div>
      <div class="st"><div class="sl">Done</div><div class="sv" id="d-done">0/8</div></div>
      <div class="st"><div class="sl">Streak</div><div class="sv" id="d-streak">0d</div></div>
      <div class="st"><div class="sl">Best</div><div class="sv" id="d-best">--</div></div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct" id="d-date"></span><span class="badge bb" id="d-badge">0%</span></div>
      <div id="task-list"></div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct">This week</span></div>
      <div style="position:relative;width:100%;height:110px;"><canvas id="miniChart"></canvas></div>
    </div>
  </div>

  <div id="v-weekly" class="view">
    <div class="sr">
      <div class="st"><div class="sl">Avg</div><div class="sv" id="w-avg">--</div></div>
      <div class="st"><div class="sl">Best day</div><div class="sv" id="w-best">--</div></div>
      <div class="st"><div class="sl">80%+ days</div><div class="sv" id="w-hits">--</div></div>
      <div class="st"><div class="sl">Streak</div><div class="sv" id="w-streak">0d</div></div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct">Daily scores</span></div>
      <div style="position:relative;width:100%;height:180px;"><canvas id="weekChart"></canvas></div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct">Breakdown</span></div>
      <div id="week-bd"></div>
    </div>
  </div>

  <div id="v-monthly" class="view">
    <div class="sr">
      <div class="st"><div class="sl">Avg</div><div class="sv" id="m-avg">--</div></div>
      <div class="st"><div class="sl">Best</div><div class="sv" id="m-best">--</div></div>
      <div class="st"><div class="sl">Perfect</div><div class="sv" id="m-perfect">--</div></div>
      <div class="st"><div class="sl">Active</div><div class="sv" id="m-active">--</div></div>
    </div>
    <div class="card">
      <div class="ch">
        <span class="ct" id="m-label"></span>
        <div style="display:flex;gap:6px;">
          <button onclick="chMo(-1)" style="background:none;border:0.5px solid rgba(0,0,0,0.2);border-radius:6px;padding:3px 10px;font-size:13px;cursor:pointer;">&#8249;</button>
          <button onclick="chMo(1)" style="background:none;border:0.5px solid rgba(0,0,0,0.2);border-radius:6px;padding:3px 10px;font-size:13px;cursor:pointer;">&#8250;</button>
        </div>
      </div>
      <div class="hml"><span class="hmll">S</span><span class="hmll">M</span><span class="hmll">T</span><span class="hmll">W</span><span class="hmll">T</span><span class="hmll">F</span><span class="hmll">S</span></div>
      <div class="hm" id="heatmap"></div>
      <div class="legend">
        <span><span class="ldot" style="background:#EAF3DE;border:0.5px solid #C0DD97;"></span>Low</span>
        <span><span class="ldot" style="background:#97C459;"></span>Good</span>
        <span><span class="ldot" style="background:#3B6D11;"></span>Crushed it</span>
        <span><span class="ldot" style="background:#FCEBEB;border:0.5px solid #F09595;"></span>Missed</span>
      </div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct">Year overview</span></div>
      <div class="yg" id="year-grid"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const TASKS=[
  {n:'Morning workout',t:'6:00 AM'},
  {n:'Review leads & pipeline',t:'8:30 AM'},
  {n:'Follow up on open deals',t:'9:00 AM'},
  {n:'Prospecting calls',t:'10:00 AM'},
  {n:'Send follow-up texts',t:'12:00 PM'},
  {n:'Log new leads in CRM',t:'2:00 PM'},
  {n:'Trade-in evaluations',t:'3:30 PM'},
  {n:'End-of-day review',t:'6:00 PM'},
];
const now=new Date();
const todayKey=now.toISOString().slice(0,10);
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MNS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function loadState(){try{return JSON.parse(localStorage.getItem('sb_v3')||'null');}catch(e){return null;}}
function saveState(){try{localStorage.setItem('sb_v3',JSON.stringify(state));}catch(e){}}

let state=loadState()||{history:{},tasks:new Array(TASKS.length).fill(false)};
if(!state.tasks)state.tasks=new Array(TASKS.length).fill(false);

if(!Object.keys(state.history).length){
  for(let i=1;i<=90;i++){
    const d=new Date(now);d.setDate(now.getDate()-i);
    state.history[d.toISOString().slice(0,10)]=Math.round(Math.random()*60+30);
  }
}

function score(){return Math.round(state.tasks.filter(Boolean).length/TASKS.length*100);}
function bc(s){return s>=80?'bg':s>=50?'ba':s>0?'br':'bb';}
function hc(s){if(s===null||s===undefined)return'#e8e8e4';if(s===0)return'#FCEBEB';if(s<50)return'#EAF3DE';if(s<80)return'#97C459';return'#3B6D11';}
function streak(){
  let n=0;const d=new Date(now);
  while(true){
    const k=d.toISOString().slice(0,10);
    const s=k===todayKey?score():state.history[k];
    if(s!==undefined&&s!==null&&s>0){n++;d.setDate(d.getDate()-1);}else break;
  }
  return n;
}
function weekData(){
  const r=[];
  for(let i=6;i>=0;i--){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const isT=k===todayKey;
    r.push({label:isT?'Today':DN[d.getDay()],s:isT?score():(state.history[k]??null),isT});
  }
  return r;
}

let mc,wc;
function renderDaily(){
  const s=score(),done=state.tasks.filter(Boolean).length,str=streak();
  const all=Object.values(state.history).filter(x=>x>0);
  const best=all.length?Math.max(...all,s):s;
  document.getElementById('d-score').textContent=s+'%';
  document.getElementById('d-done').textContent=done+'/'+TASKS.length;
  document.getElementById('d-streak').textContent=str+'d';
  document.getElementById('d-best').textContent=best+'%';
  document.getElementById('d-date').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const b=document.getElementById('d-badge');b.textContent=s+'%';b.className='badge '+bc(s);
  const list=document.getElementById('task-list');list.innerHTML='';
  TASKS.forEach((t,i)=>{
    const row=document.createElement('div');row.className='tr';
    row.innerHTML='<div class="ck '+(state.tasks[i]?'done':'')+'"></div><span class="tn '+(state.tasks[i]?'done':'')+'">' +t.n+'</span><span class="tt">'+t.t+'</span>';
    row.onclick=()=>{state.tasks[i]=!state.tasks[i];state.history[todayKey]=score();saveState();renderAll();};
    list.appendChild(row);
  });
  const wd=weekData();
  if(mc)mc.destroy();
  mc=new Chart(document.getElementById('miniChart'),{type:'bar',data:{labels:wd.map(d=>d.label),datasets:[{data:wd.map(d=>d.s??0),backgroundColor:wd.map(d=>d.isT?'#378ADD':d.s>=80?'#639922':d.s>=50?'#BA7517':d.s>0?'#E24B4A':'#D3D1C7'),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'%'}}},scales:{y:{min:0,max:100,display:false},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
}
function renderWeekly(){
  const wd=weekData();
  const sc=wd.map(d=>d.s).filter(s=>s!==null);
  const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):0;
  const best=sc.length?Math.max(...sc):0;
  document.getElementById('w-avg').textContent=avg+'%';
  document.getElementById('w-best').textContent=best+'%';
  document.getElementById('w-hits').textContent=sc.filter(s=>s>=80).length;
  document.getElementById('w-streak').textContent=streak()+'d';
  if(wc)wc.destroy();
  wc=new Chart(document.getElementById('weekChart'),{type:'bar',data:{labels:wd.map(d=>d.label),datasets:[{data:wd.map(d=>d.s??0),backgroundColor:wd.map(d=>d.isT?'#378ADD':d.s>=80?'#639922':d.s>=50?'#BA7517':d.s>0?'#E24B4A':'#D3D1C7'),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'%'}}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:12}},grid:{display:false}}}}});
  const bd=document.getElementById('week-bd');bd.innerHTML='';
  wd.forEach(d=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);';
    row.innerHTML='<span style="font-size:14px;">'+d.label+'</span><span class="badge '+(d.s===null?'bb':bc(d.s))+'">'+(d.s===null?'--':d.s+'%')+'</span>';
    bd.appendChild(row);
  });
}
let vMo=new Date(now.getFullYear(),now.getMonth(),1);
function chMo(dir){vMo=new Date(vMo.getFullYear(),vMo.getMonth()+dir,1);renderMonthly();}
function renderMonthly(){
  const yr=vMo.getFullYear(),mo=vMo.getMonth();
  document.getElementById('m-label').textContent=MN[mo]+' '+yr;
  const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const scores=[];
  for(let d=1;d<=dim;d++){
    const k=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    scores.push(k===todayKey?score():(state.history[k]??null));
  }
  const vs=scores.filter(s=>s!==null);
  document.getElementById('m-avg').textContent=vs.length?Math.round(vs.reduce((a,b)=>a+b,0)/vs.length)+'%':'--';
  document.getElementById('m-best').textContent=vs.length?Math.max(...vs)+'%':'--';
  document.getElementById('m-perfect').textContent=vs.filter(s=>s===100).length;
  document.getElementById('m-active').textContent=vs.filter(s=>s>0).length;
  const hm=document.getElementById('heatmap');hm.innerHTML='';
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='hmd';e.style.background='transparent';hm.appendChild(e);}
  scores.forEach((s,i)=>{
    const c=document.createElement('div');c.className='hmd';c.style.background=hc(s);
    c.title=MN[mo]+' '+(i+1)+': '+(s!==null?s+'%':'no data');hm.appendChild(c);
  });
  const yg=document.getElementById('year-grid');yg.innerHTML='';
  for(let m=0;m<12;m++){
    const dim2=new Date(yr,m+1,0).getDate(),fd2=new Date(yr,m,1).getDay();
    const col=document.createElement('div');col.className='ym';
    col.innerHTML='<div class="yml">'+MNS[m]+'</div><div class="ymg" id="ym'+m+'"></div>';
    yg.appendChild(col);
    setTimeout(()=>{
      const g=document.getElementById('ym'+m);if(!g)return;
      for(let i=0;i<fd2;i++){const e=document.createElement('div');e.className='yc';e.style.background='transparent';g.appendChild(e);}
      for(let d=1;d<=dim2;d++){
        const k=yr+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const s=k===todayKey?score():(state.history[k]??null);
        const c=document.createElement('div');c.className='yc';c.style.background=hc(s);g.appendChild(c);
      }
    },0);
  }
}
function renderAll(){renderDaily();renderWeekly();renderMonthly();}
function showView(v,btn){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(e=>e.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  btn.classList.add('active');
  if(v==='weekly')renderWeekly();
  else if(v==='monthly')renderMonthly();
  else renderDaily();
}
state.history[todayKey]=score();
saveState();
renderAll();
</script>
</body>
</html>
